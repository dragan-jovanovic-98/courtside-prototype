name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Configure Next.js for GitHub Pages
        run: |
          cat > next.config.ts << 'CONF'
          import type { NextConfig } from "next";

          const nextConfig: NextConfig = {
            output: "export",
            basePath: "/courtside-prototype",
            images: {
              unoptimized: true,
            },
          };

          export default nextConfig;
          CONF

      - name: Prefix static asset paths with basePath
        run: |
          find src -name '*.tsx' -exec sed -i 's|src="/courtside-logo.svg"|src="/courtside-prototype/courtside-logo.svg"|g' {} +
          find src -name '*.tsx' -exec sed -i 's|src="/COURTSIDE AI Horizontal Black resized.png"|src="/courtside-prototype/COURTSIDE AI Horizontal Black resized.png"|g' {} +

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
